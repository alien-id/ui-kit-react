# .github/workflows/publish.yml
name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Validate tag matches package.json
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/v}
          PACKAGE_VERSION=$(bun -e "const pkg = await Bun.file('package.json').json(); console.log(pkg.version);")
          if [ "$TAG_NAME" != "$PACKAGE_VERSION" ]; then
            echo "Error: Tag v$TAG_NAME does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - run: bun run build

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Determine npm tag
        id: npm-tag
        run: |
          VERSION=$(bun -e "const pkg = await Bun.file('package.json').json(); console.log(pkg.version);")
          if [[ "$VERSION" == *"-alpha"* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-beta"* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - run: npm publish --access public --provenance --tag ${{ steps.npm-tag.outputs.tag }}

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.npm-tag.outputs.tag != 'latest' }}
